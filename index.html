<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC Mobile App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'scc-blue': '#3A77F2', 
                'scc-bg': '#0A0F1D', 
                'scc-dark-card': '#161B29'
              }
            }
          }
        }
    </script>
</head>
<body class="bg-scc-bg min-h-screen text-gray-800 font-sans max-w-md mx-auto relative overflow-x-hidden">

    <div id="login-view" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Iniciar Sesión</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Usuario</label>
                    <input type="text" id="username" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-scc-blue outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Contraseña</label>
                    <input type="password" id="password" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-scc-blue outline-none" required>
                </div>
                <button type="submit" class="w-full bg-scc-blue text-white p-2.5 rounded hover:bg-blue-700 transition font-semibold">Ingresar</button>
                <p id="login-error" class="text-red-500 text-sm hidden text-center mt-2"></p>
            </form>
        </div>
    </div>

    <div id="dashboard-view" class="hidden pb-24">
        <header class="flex justify-between items-center p-6 bg-scc-bg text-white">
            <h1 class="text-3xl font-bold tracking-tight">SCC</h1>
            <button id="logout-btn" class="text-white hover:text-gray-300 transition-colors" title="Cerrar sesión">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
                </svg>
            </button>
        </header>

        <div class="p-6 space-y-6">
            <div id="balance-card" class="bg-scc-blue p-6 rounded-2xl text-white shadow-lg">
                <p class="text-sm font-medium">Balance</p>
                <p id="total-balance" class="text-5xl font-extrabold mt-3 tracking-tight">$0.00</p>
            </div>

            <div id="action-buttons" class="grid grid-cols-2 gap-4">
                <button id="btn-solicitud" class="bg-white text-gray-800 p-4 rounded-xl font-semibold text-sm shadow hover:bg-gray-100 transition-colors">Solicitud</button>
                <button id="btn-transferir" class="bg-white text-gray-800 p-4 rounded-xl font-semibold text-sm shadow hover:bg-gray-100 transition-colors">Transferir</button>
            </div>
            
            <p id="welcome-message" class="text-gray-300 font-semibold text-lg hidden"></p>
            
            <div id="loading" class="text-scc-blue font-semibold hidden text-center">Cargando datos...</div>
            <div id="error-message" class="text-red-500 hidden mb-4 text-center"></div>
            
            <div id="comisiones-container" class="space-y-4"></div>
        </div>
    </div>

    <div id="solicitud-view" class="hidden min-h-screen bg-scc-bg pb-10">
        <header class="flex items-center p-6 bg-scc-bg text-white border-b border-gray-800">
            <button id="btn-volver-dashboard" class="mr-4 text-white hover:text-gray-300 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </button>
            <h2 class="text-xl font-bold tracking-tight">Nueva Solicitud</h2>
        </header>

        <div class="p-6">
            <form id="form-nueva-solicitud" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Tipo de comisión</label>
                    <select id="sol_comision" required class="w-full p-3 bg-white text-gray-800 rounded-lg outline-none focus:ring-2 focus:ring-scc-blue appearance-none">
                        <option value="" disabled selected>Seleccione el tipo de comisión</option>
                        <option value="Zelle">Zelle</option>
                        <option value="Bolivares">Bolívares</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Paypal">Paypal</option>
                        <option value="B_Panama">Banesco Panamá</option>
                        <option value="M_Panama">Mercantil Panamá</option>
                        <option value="Credito PDV">Crédito PDV</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Monto</label>
                    <input type="number" id="sol_monto" required min="0" max="5000" step="0.01" class="w-full p-3 bg-white text-gray-800 rounded-lg outline-none focus:ring-2 focus:ring-scc-blue">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Fecha*</label>
                    <input type="date" id="sol_fecha" required class="w-full p-3 bg-white text-gray-800 rounded-lg outline-none focus:ring-2 focus:ring-scc-blue">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Observaciones*</label>
                    <textarea id="sol_observaciones" required rows="3" class="w-full p-3 bg-white text-gray-800 rounded-lg outline-none focus:ring-2 focus:ring-scc-blue resize-none"></textarea>
                </div>

                <button type="submit" id="btn-submit-solicitud" class="w-full mt-6 border border-[#E91E63] text-[#E91E63] hover:bg-[#E91E63] hover:text-white p-3 rounded-lg transition font-semibold">
                    Submit
                </button>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white text-sm px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 pointer-events-none z-50 whitespace-nowrap">
        Mensaje
    </div>

    <!-- Global Loader -->
    <div id="global-loader" class="fixed inset-0 bg-black/60 flex items-center justify-center z-[60] hidden">
        <div class="bg-scc-dark-card p-6 rounded-2xl flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-scc-blue border-t-transparent rounded-full animate-spin mb-3"></div>
            <p id="loader-text" class="text-white text-sm font-medium">Cargando...</p>
        </div>
    </div>

    <!-- Admin Bottom Navigation -->
    <nav id="admin-nav" class="hidden fixed bottom-0 left-0 right-0 bg-scc-dark-card border-t border-gray-800 z-50 max-w-md mx-auto" style="padding-bottom: env(safe-area-inset-bottom, 0px);">
        <div class="flex justify-around items-center h-16 pb-safe">
            <button id="nav-dashboard" class="flex flex-col items-center justify-center w-full h-full text-scc-blue active:opacity-70">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
                </svg>
                <span class="text-xs mt-1">Dashboard</span>
            </button>
            <button id="nav-comisiones" class="flex flex-col items-center justify-center w-full h-full text-gray-400 active:opacity-70">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
                </svg>
                <span class="text-xs mt-1">Comisiones</span>
            </button>
            <button id="nav-trabajadores" class="flex flex-col items-center justify-center w-full h-full text-gray-400 active:opacity-70">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                </svg>
                <span class="text-xs mt-1">Trabajadores</span>
            </button>
        </div>
    </nav>

    <!-- Admin Comisiones View -->
    <div id="admin-comisiones-view" class="hidden min-h-screen bg-scc-bg pb-20">
        <header class="flex items-center p-6 bg-scc-bg text-white border-b border-gray-800">
            <h2 class="text-xl font-bold tracking-tight">Comisiones Pendientes</h2>
        </header>
        <div class="p-4">
            <div id="admin-loading" class="text-scc-blue font-semibold hidden text-center py-4">Cargando...</div>
            <div id="admin-comisiones-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- Trabajadores View (Admin) -->
    <div id="trabajadores-view" class="hidden min-h-screen bg-scc-bg pb-20">
        <header class="flex items-center p-6 bg-scc-bg text-white border-b border-gray-800">
            <h2 class="text-xl font-bold tracking-tight">Trabajadores</h2>
        </header>
        <div class="p-4">
            <div id="trabajadores-loading" class="text-scc-blue font-semibold hidden text-center py-4">Cargando...</div>
            <div id="trabajadores-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- Trabajador Detail View (Admin) -->
    <div id="trabajador-detail-view" class="hidden min-h-screen bg-scc-bg pb-20">
        <header class="flex items-center p-6 bg-scc-bg text-white border-b border-gray-800">
            <button onclick="showView('trabajadores')" class="mr-4 text-white hover:text-gray-300 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </button>
            <h2 class="text-xl font-bold tracking-tight" id="trabajador-detail-title">Detalle del Trabajador</h2>
        </header>
        <div class="p-4 space-y-4">
            <!-- Balance Card -->
            <div class="bg-scc-blue p-6 rounded-2xl text-white shadow-lg">
                <p class="text-sm font-medium">Monto Disponible</p>
                <p id="trabajador-detail-balance" class="text-4xl font-extrabold mt-3 tracking-tight">$0.00</p>
            </div>

            <!-- Last 10 Commissions -->
            <div>
                <h3 class="text-white font-semibold mb-3">Últimas 10 Comisiones</h3>
                <div id="trabajador-detail-comisiones" class="space-y-3">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- User Detail View (for admin) -->
    <div id="user-detail-view" class="hidden min-h-screen bg-scc-bg pb-20">
        <header class="flex items-center p-6 bg-scc-bg text-white border-b border-gray-800">
            <button onclick="showView('admin-comisiones')" class="mr-4 text-white hover:text-gray-300 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </button>
            <h2 class="text-xl font-bold tracking-tight" id="user-detail-title">Detalle de Usuario</h2>
        </header>
        <div class="p-4 space-y-4">
            <!-- Balance Card -->
            <div class="bg-scc-blue p-6 rounded-2xl text-white shadow-lg">
                <p class="text-sm font-medium">Monto Disponible</p>
                <p id="user-detail-balance" class="text-4xl font-extrabold mt-3 tracking-tight">$0.00</p>
            </div>
            
            <!-- Last 3 Requests -->
            <div>
                <h3 class="text-white font-semibold mb-3">Últimas 3 Solicitudes</h3>
                <div id="user-detail-requests" class="space-y-3">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Referencias al DOM
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const solicitudView = document.getElementById('solicitud-view');
        const adminComisionesView = document.getElementById('admin-comisiones-view');
        const userDetailView = document.getElementById('user-detail-view');
        
        const loginForm = document.getElementById('login-form');
        const formNuevaSolicitud = document.getElementById('form-nueva-solicitud');
        
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const comisionesContainer = document.getElementById('comisiones-container');
        const loadingIndicator = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');
        const welcomeMessage = document.getElementById('welcome-message');
        const totalBalanceEl = document.getElementById('total-balance');
        const toast = document.getElementById('toast');
        const btnSubmitSolicitud = document.getElementById('btn-submit-solicitud');

        // Global Loader Functions
        function showLoader(text = 'Cargando...') {
            document.getElementById('loader-text').textContent = text;
            document.getElementById('global-loader').classList.remove('hidden');
        }

        function hideLoader() {
            document.getElementById('global-loader').classList.add('hidden');
        }

        // Helper function to format date to dd/mm/yyyy
        function formatDate(dateString) {
            if (!dateString) return 'Sin fecha';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return 'Sin fecha';
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // Función para cambiar de vista
        function showView(view) {
            loginView.classList.add('hidden');
            dashboardView.classList.add('hidden');
            solicitudView.classList.add('hidden');
            adminComisionesView.classList.add('hidden');
            userDetailView.classList.add('hidden');
            document.getElementById('trabajadores-view').classList.add('hidden');
            document.getElementById('trabajador-detail-view').classList.add('hidden');

            if (view === 'dashboard') {
                dashboardView.classList.remove('hidden');
                toggleAdminNav();
                fetchComisiones();
            } else if (view === 'solicitud') {
                solicitudView.classList.remove('hidden');
                document.getElementById('sol_fecha').valueAsDate = new Date();
                toggleAdminNav();
            } else if (view === 'admin-comisiones') {
                adminComisionesView.classList.remove('hidden');
                toggleAdminNav();
                fetchAdminComisiones();
            } else if (view === 'user-detail') {
                userDetailView.classList.remove('hidden');
                toggleAdminNav();
            } else if (view === 'trabajadores') {
                document.getElementById('trabajadores-view').classList.remove('hidden');
                toggleAdminNav();
                fetchTrabajadores();
            } else if (view === 'trabajador-detail') {
                document.getElementById('trabajador-detail-view').classList.remove('hidden');
                toggleAdminNav();
            } else {
                loginView.classList.remove('hidden');
                loginForm.reset();
                document.getElementById('admin-nav').classList.add('hidden');
            }
        }

        // Mostrar Toast
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 text-white text-sm px-6 py-3 rounded-full shadow-xl transition-all duration-300 z-50 whitespace-nowrap ${isError ? 'bg-red-600' : 'bg-gray-800'}`;
            
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        // Lista de usuarios admin permitidos (case-insensitive)
        const ADMIN_USERS = ['donatosm', 'donato', 'admin', 'julianalanzadf'];

        // Verificar si usuario es admin
        function checkIsAdmin() {
            const username = localStorage.getItem('wp_username');
            const normalizedUsername = username ? username.toLowerCase().trim() : '';
            return ADMIN_USERS.includes(normalizedUsername);
        }

        // Mostrar/ocultar navegación de admin
        function toggleAdminNav() {
            const adminNav = document.getElementById('admin-nav');
            
            if (checkIsAdmin()) {
                adminNav.classList.remove('hidden');
                adminNav.style.display = 'block';
                adminNav.style.visibility = 'visible';
                adminNav.style.opacity = '1';
            } else {
                adminNav.classList.add('hidden');
                adminNav.style.display = 'none';
            }
        }

        // Update active nav state
        function setActiveNav(view) {
            const navComisiones = document.getElementById('nav-comisiones');
            const navTrabajadores = document.getElementById('nav-trabajadores');
            const navDashboard = document.getElementById('nav-dashboard');

            // Reset all
            navComisiones.classList.remove('text-scc-blue');
            navComisiones.classList.add('text-gray-400');
            navTrabajadores.classList.remove('text-scc-blue');
            navTrabajadores.classList.add('text-gray-400');
            navDashboard.classList.remove('text-scc-blue');
            navDashboard.classList.add('text-gray-400');

            // Set active
            if (view === 'comisiones') {
                navComisiones.classList.remove('text-gray-400');
                navComisiones.classList.add('text-scc-blue');
            } else if (view === 'trabajadores') {
                navTrabajadores.classList.remove('text-gray-400');
                navTrabajadores.classList.add('text-scc-blue');
            } else {
                navDashboard.classList.remove('text-gray-400');
                navDashboard.classList.add('text-scc-blue');
            }
        }

        // Fetch comisiones en draft (solo admin)
        async function fetchAdminComisiones() {
            const token = localStorage.getItem('wp_token');
            const loadingEl = document.getElementById('admin-loading');
            const listEl = document.getElementById('admin-comisiones-list');
            
            if (!token || !checkIsAdmin()) return;

            loadingEl.classList.remove('hidden');
            listEl.innerHTML = '';

            try {
                // Fetch posts en draft con tarea "Pago de comisión"
                const response = await fetch(`https://scc.ciwok.com/wp-json/jet-cct/comisiones_dec/?cct_status=draft&tarea=Pago%20de%20comisión`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('Error al cargar comisiones');

                const data = await response.json();
                loadingEl.classList.add('hidden');

                if (data.length === 0) {
                    listEl.innerHTML = '<p class="text-gray-400 text-center py-8">No hay comisiones pendientes.</p>';
                    return;
                }

                // Calcular sumatoria total
                const totalPendiente = data.reduce((sum, item) => {
                    return sum + Math.abs(parseFloat(item.monto_comision || item.monto) || 0);
                }, 0);

                // Mostrar bloque de sumatoria
                const totalBlock = document.createElement('div');
                totalBlock.className = 'bg-scc-blue p-4 rounded-xl mb-4';
                totalBlock.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-white text-sm font-medium">Total Comisiones Pendientes:</span>
                        <span class="text-white text-2xl font-bold">$${totalPendiente.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                    </div>
                    <p class="text-blue-200 text-xs mt-1">${data.length} solicitud(es) en espera</p>
                `;
                listEl.appendChild(totalBlock);

                data.forEach((item) => {
                    const card = document.createElement('div');
                    card.className = 'bg-scc-dark-card p-4 rounded-xl border border-gray-800';

                    const amountRaw = parseFloat(item.monto_comision || item.monto) || 0;
                    const formattedAmount = Math.abs(amountRaw).toLocaleString('en-US', { minimumFractionDigits: 2 });
                    const formattedDate = formatDate(item.fecha);

                    card.innerHTML = `
                        <div class="space-y-2 mb-4 text-sm">
                            <div class="flex justify-between items-center">
                                <span class="text-gray-400">Tarea:</span>
                                <span class="text-white font-medium">${item.tarea || 'Sin tarea'}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-gray-400">Status:</span>
                                <span class="text-yellow-400 font-medium uppercase">${item.cct_status || 'draft'}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-gray-400">Monto:</span>
                                <span class="text-white font-bold text-lg">$${formattedAmount}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-gray-400">Fecha:</span>
                                <span class="text-white">${formattedDate}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-gray-400">Usuario:</span>
                                <button onclick="showUserDetail('${item.usuario || ''}')" class="text-scc-blue font-semibold hover:underline bg-transparent border-none p-0 cursor-pointer">
                                    ${item.usuario || 'Sin usuario'}
                                </button>
                            </div>
                            <div>
                                <span class="text-gray-400">Observación:</span>
                                <p class="text-white mt-1 bg-gray-800 p-2 rounded">${item.observaciones || 'Sin observaciones'}</p>
                            </div>
                        </div>
                        <button onclick="publishComision(${item._ID})" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-semibold transition-colors">
                            Marcar como Pagado
                        </button>
                    `;
                    listEl.appendChild(card);
                });

            } catch (err) {
                loadingEl.classList.add('hidden');
                listEl.innerHTML = `<p class="text-red-500 text-center">${err.message}</p>`;
            }
        }

        // Publicar comisión (cambiar draft → published)
        async function publishComision(id) {
            const token = localStorage.getItem('wp_token');
            if (!token || !checkIsAdmin()) return;

            showLoader('Procesando...');

            try {
                const response = await fetch(`https://scc.ciwok.com/wp-json/jet-cct/comisiones_dec/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ cct_status: 'published' })
                });

                hideLoader();

                if (response.ok) {
                    showToast('Comisión marcada como pagada');
                    fetchAdminComisiones(); // Recargar lista
                } else {
                    throw new Error('Error al actualizar');
                }
            } catch (err) {
                hideLoader();
                showToast(err.message, true);
            }
        }

        // Mostrar detalle de usuario (para admin)
        async function showUserDetail(username) {
            if (!username) return;

            const token = localStorage.getItem('wp_token');
            if (!token) return;

            showLoader('Cargando detalle...');

            // Actualizar título
            document.getElementById('user-detail-title').textContent = `Detalle: ${username}`;

            try {
                // Obtener todas las comisiones del usuario
                const response = await fetch(`https://scc.ciwok.com/wp-json/jet-cct/comisiones_dec/?usuario=${username}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('Error al cargar datos del usuario');
                
                const data = await response.json();
                
                // Calcular balance total
                const balanceTotal = data.reduce((sum, item) => {
                    return sum + (parseFloat(item.monto_comision || item.monto) || 0);
                }, 0);
                
                document.getElementById('user-detail-balance').textContent = 
                    `$${balanceTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                
                // Obtener últimas 3 solicitudes (ordenadas por fecha más reciente)
                const ultimasSolicitudes = data
                    .sort((a, b) => new Date(b.cct_created) - new Date(a.cct_created))
                    .slice(0, 3);
                
                const requestsContainer = document.getElementById('user-detail-requests');
                requestsContainer.innerHTML = '';
                
                if (ultimasSolicitudes.length === 0) {
                    requestsContainer.innerHTML = '<p class="text-gray-400 text-center py-4">No hay solicitudes registradas.</p>';
                } else {
                    ultimasSolicitudes.forEach(item => {
                        const amountRaw = parseFloat(item.monto_comision || item.monto) || 0;
                        const formattedAmount = Math.abs(amountRaw).toLocaleString('en-US', { minimumFractionDigits: 2 });
                        
                        const card = document.createElement('div');
                        card.className = 'bg-scc-dark-card p-4 rounded-xl border border-gray-800';
                        card.innerHTML = `
                            <div class="space-y-2 mb-4 text-sm">
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Fecha:</span>
                                    <span class="text-white font-medium">${new Date(item.cct_created).toLocaleDateString()}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Tarea:</span>
                                    <span class="text-white font-medium">${item.tarea || 'Sin tarea'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Status:</span>
                                    <span class="${item.cct_status === 'published' ? 'text-green-400' : 'text-yellow-400'} font-medium uppercase">${item.cct_status || 'draft'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Monto:</span>
                                    <span class="text-white font-bold text-lg">$${formattedAmount}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Tipo:</span>
                                    <span class="text-white">${item.comision || 'Sin tipo'}</span>
                                </div>
                                <div>
                                    <span class="text-gray-400">Observación:</span>
                                    <p class="text-white mt-1 bg-gray-800 p-2 rounded">${item.observaciones || 'Sin observaciones'}</p>
                                </div>
                            </div>
                        `;
                        requestsContainer.appendChild(card);
                    });
                }
                
                // Mostrar vista
                hideLoader();
                showView('user-detail');

            } catch (err) {
                hideLoader();
                showToast('Error: ' + err.message, true);
            }
        }

        // Fetch trabajadores (solo admin)
        async function fetchTrabajadores() {
            const token = localStorage.getItem('wp_token');
            const loadingEl = document.getElementById('trabajadores-loading');
            const listEl = document.getElementById('trabajadores-list');

            if (!token || !checkIsAdmin()) return;

            showLoader('Cargando trabajadores...');
            loadingEl.classList.remove('hidden');
            listEl.innerHTML = '';

            try {
                const response = await fetch('https://scc.ciwok.com/wp-json/jet-cct/trabajadores', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('Error al cargar trabajadores');

                const data = await response.json();
                hideLoader();
                loadingEl.classList.add('hidden');

                if (data.length === 0) {
                    listEl.innerHTML = '<p class="text-gray-400 text-center py-8">No hay trabajadores registrados.</p>';
                    return;
                }

                data.forEach((item) => {
                    const card = document.createElement('div');
                    card.className = 'bg-scc-dark-card p-4 rounded-xl border border-gray-800 cursor-pointer hover:border-scc-blue transition-colors';
                    card.onclick = () => showTrabajadorDetail(item.usuario || item.nombre || item._ID);

                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-white font-semibold text-lg">${item.nombre || item.usuario || 'Sin nombre'}</p>
                                <p class="text-gray-400 text-sm">${item.usuario || ''}</p>
                            </div>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-400">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                            </svg>
                        </div>
                    `;
                    listEl.appendChild(card);
                });

            } catch (err) {
                hideLoader();
                loadingEl.classList.add('hidden');
                listEl.innerHTML = `<p class="text-red-500 text-center">${err.message}</p>`;
            }
        }

        // Mostrar detalle de trabajador con últimas 10 comisiones
        async function showTrabajadorDetail(username) {
            if (!username) return;

            const token = localStorage.getItem('wp_token');
            if (!token) return;

            showLoader('Cargando detalle...');
            document.getElementById('trabajador-detail-title').textContent = `Trabajador: ${username}`;

            try {
                const response = await fetch(`https://scc.ciwok.com/wp-json/jet-cct/comisiones_dec/?usuario=${username}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('Error al cargar comisiones');

                const data = await response.json();

                // Calcular balance total
                const balanceTotal = data.reduce((sum, item) => {
                    return sum + (parseFloat(item.monto_comision || item.monto) || 0);
                }, 0);

                document.getElementById('trabajador-detail-balance').textContent =
                    `$${balanceTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

                // Obtener últimas 10 comisiones
                const ultimasComisiones = data
                    .sort((a, b) => new Date(b.cct_created) - new Date(a.cct_created))
                    .slice(0, 10);

                const comisionesContainer = document.getElementById('trabajador-detail-comisiones');
                comisionesContainer.innerHTML = '';

                if (ultimasComisiones.length === 0) {
                    comisionesContainer.innerHTML = '<p class="text-gray-400 text-center py-4">No hay comisiones registradas.</p>';
                } else {
                    ultimasComisiones.forEach(item => {
                        const amountRaw = parseFloat(item.monto_comision || item.monto) || 0;
                        const formattedAmount = Math.abs(amountRaw).toLocaleString('en-US', { minimumFractionDigits: 2 });
                        const formattedDate = formatDate(item.fecha);
                        const statusColor = item.cct_status === 'published' ? 'text-green-400' : 'text-yellow-400';

                        const card = document.createElement('div');
                        card.className = 'bg-scc-dark-card p-4 rounded-xl border border-gray-800';
                        card.innerHTML = `
                            <div class="space-y-2 text-sm">
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Fecha:</span>
                                    <span class="text-white">${formattedDate}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Tipo:</span>
                                    <span class="text-white font-medium">${item.comision || 'Sin tipo'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Monto:</span>
                                    <span class="text-white font-bold">$${formattedAmount}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">Status:</span>
                                    <span class="${statusColor} uppercase font-semibold text-xs">${item.cct_status || 'draft'}</span>
                                </div>
                                <div class="pt-2 border-t border-gray-700">
                                    <p class="text-gray-400 text-xs">${item.observaciones || 'Sin observaciones'}</p>
                                </div>
                            </div>
                        `;
                        comisionesContainer.appendChild(card);
                    });
                }

                hideLoader();
                showView('trabajador-detail');

            } catch (err) {
                hideLoader();
                showToast('Error: ' + err.message, true);
            }
        }

        // Navegación admin
        document.getElementById('nav-comisiones').addEventListener('click', () => {
            setActiveNav('comisiones');
            showView('admin-comisiones');
        });

        document.getElementById('nav-trabajadores').addEventListener('click', () => {
            setActiveNav('trabajadores');
            showView('trabajadores');
        });

        document.getElementById('nav-dashboard').addEventListener('click', () => {
            setActiveNav('dashboard');
            showView('dashboard');
        });

        // Navegación
        document.getElementById('btn-solicitud').addEventListener('click', () => showView('solicitud'));
        document.getElementById('btn-volver-dashboard').addEventListener('click', () => showView('dashboard'));
        document.getElementById('btn-transferir').addEventListener('click', () => showToast('La opción de Transferencia aún no está disponible.'));

        // Verificar sesión inicial
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('wp_token');
            if (token) showView('dashboard');
        });

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            loginError.classList.add('hidden');

            showLoader('Iniciando sesión...');

            try {
                const response = await fetch('https://scc.ciwok.com/wp-json/jwt-auth/v1/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userVal, password: passVal })
                });
                const data = await response.json();

                hideLoader();

                if (response.ok) {
                    localStorage.setItem('wp_token', data.token);
                    localStorage.setItem('wp_username', userVal);
                    localStorage.setItem('wp_display_name', data.user_display_name);
                    showView('dashboard');
                } else {
                    loginError.textContent = data.message || 'Credenciales inválidas';
                    loginError.classList.remove('hidden');
                }
            } catch (err) {
                hideLoader();
                loginError.textContent = 'Error de conexión con el servidor.';
                loginError.classList.remove('hidden');
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('wp_token');
            localStorage.removeItem('wp_username');
            localStorage.removeItem('wp_display_name');
            document.getElementById('admin-nav').classList.add('hidden');
            comisionesContainer.innerHTML = '';
            totalBalanceEl.textContent = '$0.00';
            showView('login');
        });

        // Fetch Comisiones
        async function fetchComisiones() {
            const token = localStorage.getItem('wp_token');
            const username = localStorage.getItem('wp_username'); 
            const displayName = localStorage.getItem('wp_display_name');
            
            if (!token || !username) return showView('login');

            welcomeMessage.textContent = `Hola, ${displayName || username}.`;
            welcomeMessage.classList.remove('hidden');
            loadingIndicator.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            comisionesContainer.innerHTML = '';

            showLoader('Cargando comisiones...');

            try {
                const response = await fetch(`https://scc.ciwok.com/wp-json/jet-cct/comisiones_dec/?usuario=${username}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(response.status === 401 ? 'Sesión expirada.' : 'Error al conectar.');

                const data = await response.json();
                loadingIndicator.classList.add('hidden');

                if (data.length === 0) {
                    comisionesContainer.innerHTML = '<p class="text-gray-400 text-center">No se encontraron registros.</p>';
                    totalBalanceEl.textContent = '$0.00';
                    return;
                }

                const balanceCalculado = data.reduce((acc, item) => acc + (parseFloat(item.monto_comision || item.monto) || 0), 0);
                totalBalanceEl.textContent = `$${balanceCalculado.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

                // Ordenamiento
                data.sort((a, b) => {
                    const dateA = new Date(a.fecha).getTime();
                    const dateB = new Date(b.fecha).getTime();
                    if (!isNaN(dateA) && !isNaN(dateB) && dateB !== dateA) return dateB - dateA; 
                    return b._ID - a._ID; 
                });

                data.forEach((item) => { 
                    const card = document.createElement('div');
                    card.className = 'bg-white p-5 rounded-2xl shadow-md border border-gray-100';
                    
                    const conceptText = item.tarea || "Registro";
                    const groupText = item.grupo || "Ciwok";
                    const detailsText = item.observaciones || item.observacion || "Sin detalles";
                    const dateText = item.fecha || "Sin fecha"; 
                    const quantityText = item.cantidad ? `Cantidad: ${item.cantidad}` : "";
                    
                    const amountRaw = parseFloat(item.monto_comision || item.monto) || 0;
                    const isNegative = amountRaw < 0;
                    const formattedAmount = Math.abs(amountRaw).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    const displayAmount = isNegative ? `-$${formattedAmount}` : `$${formattedAmount}`;

                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <p class="font-bold text-gray-800 text-base">${conceptText}</p>
                            <p class="text-gray-800 text-base">${groupText}</p>
                        </div>
                        <div class="flex justify-between items-center text-xs text-gray-500 mb-2">
                            <p class="truncate pr-2 max-w-[60%]">${detailsText}</p>
                            <p>${dateText}</p>
                        </div>
                        <div class="flex justify-between items-center text-xs text-gray-500 pt-2 border-t border-gray-100">
                            <p>${quantityText}</p>
                            <p class="font-bold text-gray-800 text-base">${displayAmount}</p>
                        </div>
                    `;
                    comisionesContainer.appendChild(card);
                });

                hideLoader();

            } catch (err) {
                hideLoader();
                loadingIndicator.classList.add('hidden');
                if (err.message === 'Sesión expirada.') logoutBtn.click();
                else {
                    errorMessage.textContent = err.message;
                    errorMessage.classList.remove('hidden');
                }
            }
        }

        // --- ENVIAR NUEVA SOLICITUD (POST API) ---
        formNuevaSolicitud.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = localStorage.getItem('wp_token');
            const username = localStorage.getItem('wp_username');

            if (!token) return showView('login');

            showLoader('Enviando solicitud...');

            const originalBtnText = btnSubmitSolicitud.textContent;
            btnSubmitSolicitud.textContent = 'Enviando...';
            btnSubmitSolicitud.disabled = true;

            const tipoComision = document.getElementById('sol_comision').value;
            const montoPositivo = parseFloat(document.getElementById('sol_monto').value);
            const montoNegativo = (montoPositivo * -1).toFixed(2);

            const payload = {
                usuario: username,
                comision: tipoComision,
                monto: montoNegativo,
                monto_comision: montoNegativo,
                fecha: document.getElementById('sol_fecha').value,
                observaciones: document.getElementById('sol_observaciones').value,
                tarea: "Pago de comisión",
                grupo: tipoComision,
                cct_status: "draft",
                cantidad: "1"
            };

            try {
                const response = await fetch('https://scc.ciwok.com/wp-json/jet-cct/comisiones_dec', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                hideLoader();
                if (response.ok) {
                    showToast('Solicitud enviada con éxito');
                    formNuevaSolicitud.reset();
                    showView('dashboard');
                } else {
                    const errData = await response.json();
                    throw new Error(errData.message || 'Error al enviar la solicitud');
                }
            } catch (error) {
                hideLoader();
                showToast(error.message, true);
            } finally {
                btnSubmitSolicitud.textContent = originalBtnText;
                btnSubmitSolicitud.disabled = false;
            }
        });

    </script>
</body>
</html>
